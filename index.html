<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Java — Rafael</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --border: #2a2d3a;
    --accent: #5bffc8;
    --accent2: #ff6b6b;
    --accent3: #f7c948;
    --text: #e8eaf0;
    --muted: #7a7f96;
    --code-bg: #1a1d26;
    --correct: #1a3d2e;
    --correct-border: #4ade80;
    --wrong: #3d1a1a;
    --wrong-border: #f87171;
    --neutral: #1e2130;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ---- HEADER ---- */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(14,15,20,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--accent); }
  .header-info {
    display: flex;
    gap: 24px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }
  #timer {
    color: var(--accent3);
    font-weight: 700;
    font-size: 1rem;
  }
  #progress-text { color: var(--accent); }

  /* ---- PROGRESS BAR ---- */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 73px;
    z-index: 99;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* ---- MAIN ---- */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  .intro {
    text-align: center;
    margin-bottom: 56px;
  }
  .intro h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.1;
  }
  .intro h1 em { color: var(--accent); font-style: normal; }
  .intro p {
    color: var(--muted);
    margin-top: 12px;
    font-size: 0.95rem;
  }

  /* ---- SECTION TITLE ---- */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    margin-bottom: 32px;
  }

  /* ---- QUESTION CARD ---- */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
    transition: border-color 0.2s;
    scroll-margin-top: 100px;
  }
  .question-card.answered-correct { border-color: var(--correct-border); }
  .question-card.answered-wrong   { border-color: var(--wrong-border); }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 16px;
  }
  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .q-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent3);
    background: rgba(247,201,72,0.1);
    border: 1px solid rgba(247,201,72,0.3);
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .q-text {
    font-size: 0.97rem;
    margin-bottom: 20px;
    color: var(--text);
    font-weight: 400;
  }
  .q-text strong { color: var(--accent3); }

  /* code blocks inside question */
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    overflow-x: auto;
    margin: 12px 0 20px;
    color: #a8d8b4;
    white-space: pre;
  }

  /* ---- OPTIONS ---- */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    width: 100%;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(91,255,200,0.04);
  }
  .option .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 22px;
    margin-top: 2px;
  }
  .option.selected { border-color: #5b9fff; background: rgba(91,159,255,0.08); }
  .option.correct  { border-color: var(--correct-border); background: var(--correct); }
  .option.wrong    { border-color: var(--wrong-border);   background: var(--wrong); }
  .option:disabled { cursor: default; }

  /* ---- OPEN QUESTION ---- */
  .open-answer {
    width: 100%;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.2s;
  }
  .open-answer:focus { outline: none; border-color: var(--accent); }

  /* ---- GABARITO ---- */
  .gabarito-box {
    margin-top: 16px;
    background: rgba(91,255,200,0.05);
    border: 1px solid rgba(91,255,200,0.2);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 0.88rem;
    color: #a0ffd8;
    display: none;
  }
  .gabarito-box strong { color: var(--accent); }
  .gabarito-box.visible { display: block; }

  /* ---- CONFIRM BTN ---- */
  .confirm-btn {
    margin-top: 18px;
    padding: 10px 22px;
    background: var(--accent);
    color: #0e0f14;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .confirm-btn:hover { opacity: 0.85; }
  .confirm-btn:disabled { opacity: 0.4; cursor: default; }

  .toggle-gabarito {
    margin-top: 10px;
    margin-left: 10px;
    padding: 10px 22px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-gabarito:hover { background: rgba(91,255,200,0.08); }

  /* ---- FEEDBACK ---- */
  .feedback {
    margin-top: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { color: var(--correct-border); }
  .feedback.err { color: var(--wrong-border); }

  /* ---- RESULT PANEL ---- */
  #result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    margin-top: 48px;
  }
  #result-panel.show { display: block; }
  #result-panel h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
  #result-panel .score { font-size: 4rem; font-weight: 800; color: var(--accent); margin: 16px 0; }
  #result-panel p { color: var(--muted); }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 24px 0;
    flex-wrap: wrap;
  }
  .result-item { text-align: center; }
  .result-item .val { font-size: 2rem; font-weight: 800; }
  .result-item .lbl { font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .val.c { color: var(--correct-border); }
  .val.w { color: var(--wrong-border); }
  .val.o { color: var(--accent3); }

  #restart-btn {
    margin-top: 24px;
    padding: 14px 36px;
    background: var(--accent);
    color: #0e0f14;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #restart-btn:hover { opacity: 0.85; }

  /* ---- SUBMIT ---- */
  #submit-area {
    text-align: center;
    margin-top: 48px;
  }
  #submit-btn {
    padding: 18px 48px;
    background: var(--accent);
    color: #0e0f14;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  #submit-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  @media(max-width:600px) {
    header { padding: 16px 20px; }
    main { padding: 32px 16px 100px; }
    .intro h1 { font-size: 1.7rem; }
    .question-card { padding: 20px; }
    .result-breakdown { gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Java<span>Sim</span></div>
  <div class="header-info">
    <span>⏱ <span id="timer">00:00</span></span>
    <span id="progress-text">0 / 51</span>
  </div>
</header>
<div class="progress-bar-wrap"><div id="progress-bar"></div></div>

<main>
  <div class="intro">
    <h1>Revisão para a <em>Prova</em></h1>
    <p>51 questões · Java Fundamentals · Responda com calma, o gabarito aparece após confirmar cada resposta.</p>
  </div>

  <div id="quiz-container"></div>

  <div id="submit-area">
    <button id="submit-btn" onclick="submitQuiz()">📊 Ver Resultado Final</button>
  </div>

  <div id="result-panel">
    <h2 id="result-title"></h2>
    <div class="score" id="result-score"></div>
    <div class="result-breakdown">
      <div class="result-item"><div class="val c" id="r-correct">0</div><div class="lbl">CORRETAS</div></div>
      <div class="result-item"><div class="val w" id="r-wrong">0</div><div class="lbl">ERRADAS</div></div>
      <div class="result-item"><div class="val o" id="r-open">0</div><div class="lbl">DISSERTATIVAS</div></div>
      <div class="result-item"><div class="val" style="color:var(--muted)" id="r-skip">0</div><div class="lbl">NÃO RESPONDIDAS</div></div>
    </div>
    <p id="result-msg"></p>
    <button id="restart-btn" onclick="restartQuiz()">🔄 Refazer Simulado</button>
  </div>
</main>

<script>
// =====================================================================
// DATA
// =====================================================================
const questions = [
  {
    n: 1,
    tag: "Compilação",
    text: "Qual a diferença fundamental entre o processo de compilação da linguagem C para o Java?",
    options: [
      "A linguagem C gera um bytecode enquanto o Java gera código de máquina nativo.",
      "A linguagem C gera código de máquina nativo para uma plataforma específica, enquanto o Java gera bytecode executado pela JVM.",
      "Ambas as linguagens geram bytecode, contudo somente o Java é mais rápido durante todo o processo.",
      "Java não precisa de um processo de compilação pois o mesmo é interpretado em tempo de execução."
    ],
    answer: "B",
    explanation: "<strong>C</strong> compila direto para código de máquina nativo (específico para cada SO/processador). <strong>Java</strong> compila para bytecode (.class), que é executado pela JVM — daí o famoso <em>\"Write Once, Run Anywhere\"</em>."
  },
  {
    n: 2,
    tag: "JDK / JVM",
    text: "Verdadeiro ou Falso: O JDK inclui o JRE. Portanto, ao instalar o JDK, você automaticamente tem a JVM disponível. O mesmo segue o princípio: <strong>\"Escreva uma vez, execute em qualquer lugar\"</strong>.",
    options: ["Verdadeiro", "Falso"],
    answer: "A",
    explanation: "Verdadeiro. A hierarquia é: <strong>JDK ⊃ JRE ⊃ JVM</strong>. Instalar o JDK já traz tudo que você precisa para desenvolver e executar programas Java."
  },
  {
    n: 3,
    tag: "Classpath",
    text: "O que o parâmetro <code>-cp</code> significa no comando abaixo?\n<pre>java -cp src App</pre>",
    options: [
      "Analise o comando abaixo executado no terminal. O que o parâmetro -cp significa?",
      "Define o classpath, ou seja, informa ao Java onde ele deve procurar pelo arquivo .class a ser executado.",
      "Especifica a versão do compilador a ser usada.",
      "Comprime o bytecode antes de executar."
    ],
    answer: "B",
    explanation: "<code>-cp</code> (ou <code>-classpath</code>) define o <em>classpath</em>: o caminho onde a JVM vai procurar os arquivos <code>.class</code>. No exemplo, ela vai procurar em <code>src/</code>."
  },
  {
    n: 4,
    tag: "Bytecode",
    text: "Verdadeiro ou Falso: O arquivo <code>App.class</code> gerado pelo <code>javac</code> é um arquivo de código binário nativo que pode ser executado diretamente pelo SO, sem a JVM.",
    options: ["Verdadeiro", "Falso"],
    answer: "B",
    explanation: "Falso. <code>.class</code> contém <strong>bytecode</strong>, não código nativo. Ele só pode ser executado pela JVM, nunca diretamente pelo SO — é exatamente isso que garante portabilidade."
  },
  {
    n: 5,
    tag: "Portabilidade",
    text: "Você desenvolve um app Java no Windows e quer executá-lo no Linux sem recompilar. O que é necessário?",
    options: [
      "Nenhuma ação; qualquer arquivo .java roda em qualquer sistema diretamente.",
      "Deve-se recompilar o código no Linux usando o javac do Linux.",
      "Ter uma JVM instalada no Linux; o mesmo bytecode (.class) funciona.",
      "Converter o .class para .exe usando uma ferramenta de empacotamento."
    ],
    answer: "C",
    explanation: "O bytecode é <strong>independente de plataforma</strong>. Basta ter uma JVM instalada no Linux — ela sabe como interpretar e executar o bytecode gerado no Windows."
  },
  {
    n: 6,
    tag: "Convenções",
    text: "O código abaixo tem um erro sutil. Identifique-o.\n<pre>public class app {\n  public static void main(String[] args) {\n    System.out.println(\"Olá, Mundo!\");\n  }\n}</pre>",
    options: [
      "O nome da classe 'app' começa com letra minúscula.",
      "Entre colchetes falta argumento para execução do código.",
      "Ao final do código é necessário inserir um ponto e vírgula.",
      "Nenhuma das alternativas anteriores."
    ],
    answer: "A",
    explanation: "Em Java, por convenção (e por exigência do compilador quando o arquivo se chama <code>App.java</code>), o nome da classe deve começar com <strong>letra maiúscula</strong>: <code>public class App</code>."
  },
  {
    n: 7,
    tag: "Classpath",
    text: "Após compilar com <code>javac src/App.java</code>, o <code>App.class</code> fica em <code>src/</code>. Se você executar <code>java App</code> <strong>sem</strong> o <code>-cp</code>, o que acontece?",
    options: [
      "Executa normalmente; Java procura em todas as pastas automaticamente.",
      "Java procura App.class no diretório atual (não em src) e lança ClassNotFoundException.",
      "O Java recompila o arquivo e executa.",
      "Nenhuma das alternativas anteriores."
    ],
    answer: "B",
    explanation: "Sem <code>-cp</code>, a JVM usa o diretório atual como classpath. Como <code>App.class</code> está em <code>src/</code>, ela não o encontra e lança <strong>ClassNotFoundException</strong>."
  },
  {
    n: 8,
    tag: "System.exit",
    text: "O código abaixo compila sem erros, mas tem comportamento inesperado. O que será impresso?\n<pre>public class App {\n  public static void main(String[] args) throws Exception {\n    System.out.println(\"Linha 1\");\n    System.exit(0);\n    System.out.println(\"Linha 2\");\n  }\n}</pre>",
    options: [
      "Apenas 'Linha 1' é impresso. System.exit(0) encerra a JVM imediatamente.",
      "Apenas 'Linha 2' é impresso.",
      "Nada é impresso pois System.exit(0) encerra antes.",
      "Imprime 'Linha 1', depois 'Linha 2' e então System.exit(0) é executado."
    ],
    answer: "A",
    explanation: "<code>System.exit(0)</code> <strong>encerra a JVM imediatamente</strong>. Tudo após essa linha é código morto (unreachable). Apenas <strong>Linha 1</strong> é impressa."
  },
  {
    n: 9,
    tag: "JDK / JRE",
    text: "Qual componente do ecossistema Java é necessário para um usuário final que apenas quer <strong>executar</strong> um programa Java, sem desenvolvê-lo?",
    options: [
      "JDK (Kit de Desenvolvimento Java).",
      "JRE (Java Runtime Environment).",
      "javac (compilador Java).",
      "JVM isolada, sem JRE."
    ],
    answer: "B",
    explanation: "O <strong>JRE</strong> contém a JVM e as bibliotecas necessárias para <em>executar</em> programas Java. O JDK é necessário apenas para quem vai <em>desenvolver/compilar</em>."
  },
  {
    n: 10,
    tag: "Compilação",
    text: "Analise a sequência:\n<pre>1. javac src/App.java\n2. java -cp src App</pre>O que aconteceria se a ordem fosse invertida (executar o passo 2 antes do 1)?",
    options: [
      "O Java executaria o .java diretamente, sem compilar.",
      "Funcionaria normalmente; Java detecta .java na ausência de .class.",
      "O Java compilaria automaticamente antes de executar.",
      "Ocorreria erro porque o arquivo App.class ainda não existe."
    ],
    answer: "D",
    explanation: "<code>java</code> precisa do arquivo <code>.class</code> para executar. Se você não compilou antes, o arquivo não existe e a JVM lança um erro. <strong>Compilar sempre vem primeiro.</strong>"
  },
  {
    n: 11,
    tag: "Concatenação",
    text: "Qual será a saída exata deste código?\n<pre>String nome = \"Java\";\nSystem.out.println(\"Olá, \" + nome + \"!\");\nSystem.out.println(\"Versão: \" + 8 + 8);\nSystem.out.println(\"Soma: \" + (8 + 8));</pre>",
    options: [
      "Saída: 'Olá, Java!', 'Versão: 88', 'Soma: 16'",
      "Saída: 'Olá, Java!', 'Versão: 88', 'Soma: 88'",
      "Ocorrerá erro de execução.",
      "Nenhuma das alternativas acima."
    ],
    answer: "A",
    explanation: "<code>\"Versão: \" + 8 + 8</code> → concatena da esquerda: <code>\"Versão: 8\" + 8 = \"Versão: 88\"</code>. Já <code>(8 + 8)</code> soma primeiro (precedência dos parênteses): <code>16</code>. Saída: <strong>Olá, Java! / Versão: 88 / Soma: 16</strong>."
  },
  {
    n: 12,
    tag: "Tipos Primitivos",
    text: "O que acontece ao tentar compilar e executar?\n<pre>byte valor = 200;\nSystem.out.println(valor);</pre>",
    options: [
      "Compila e imprime 200, pois byte aceita qualquer número inteiro pequeno.",
      "Erro de compilação: 200 está fora do intervalo do tipo byte (-128 a 127).",
      "Compila, mas imprime -56 por causa do overflow silencioso.",
      "Compila e imprime 200; o Java converte automaticamente para int."
    ],
    answer: "B",
    explanation: "O tipo <code>byte</code> aceita valores de <strong>-128 a 127</strong>. O valor 200 está fora desse intervalo e o compilador rejeita a atribuição com erro em <em>tempo de compilação</em>."
  },
  {
    n: 13,
    tag: "Tipos Primitivos",
    text: "Verdadeiro ou Falso: <code>String</code> é um tipo primitivo em Java, assim como <code>int</code>, <code>double</code> e <code>boolean</code>.",
    options: ["Verdadeiro", "Falso"],
    answer: "B",
    explanation: "Falso. <code>String</code> é uma <strong>classe</strong> (objeto), não tipo primitivo. Os primitivos em Java são: byte, short, int, long, float, double, boolean e char. String fica no heap e não tem tamanho fixo."
  },
  {
    n: 14,
    tag: "Tipo char",
    text: "Qual das alternativas abaixo está <strong>INCORRETA</strong> sobre o tipo <code>char</code>?",
    options: [
      "char ocupa 16 bits de memória.",
      "char pode armazenar caracteres Unicode, como letras acentuadas e símbolos.",
      "char é um tipo primitivo numérico sem sinal, podendo armazenar valores de 0 a 65.535.",
      "char e String são equivalentes quando se armazena um único caractere; ambos se comportam da mesma forma."
    ],
    answer: "D",
    explanation: "<code>char</code> e <code>String</code> <strong>não são equivalentes</strong>. <code>char</code> é primitivo e armazena um único caractere. <code>String</code> é objeto, imutável, e suporta métodos. Você não pode chamar <code>'a'.length()</code>, por exemplo."
  },
  {
    n: 15,
    tag: "Tipagem Forte",

// =====================================================================
// STATE
// =====================================================================
let answered = {};
let shuffledOptions = {}; // stores shuffled option order per question: { qn: [ {text, originalIndex}, ... ] }
let startTime = Date.now();
let timerInterval;

// =====================================================================
// SHUFFLE HELPERS
// =====================================================================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const ORIG_LETTERS = ['A','B','C','D'];

// Build shuffled options for all MCQ questions once per quiz load
function buildShuffledOptions() {
  shuffledOptions = {};
  questions.forEach(q => {
    if (q.type === 'open') return;
    const indexed = q.options.map((text, i) => ({ text, originalIndex: i }));
    shuffledOptions[q.n] = shuffleArray(indexed);
  });
}

// Given a question and the displayed position index (0-3), return whether it's the correct answer
function isCorrectOption(q, displayedIndex) {
  const originalIndex = ORIG_LETTERS.indexOf(q.answer); // 0=A,1=B...
  return shuffledOptions[q.n][displayedIndex].originalIndex === originalIndex;
}

// =====================================================================
// BUILD UI
// =====================================================================
function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = {};
  buildShuffledOptions();
  updateProgress();

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-${q.n}`;

    const isOpen = q.type === 'open';

    card.innerHTML = `
      <div class="q-header">
        <span class="q-number">Questão ${q.n} / 51</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-text">${q.text}</div>
      ${isOpen ? buildOpenQuestion(q) : buildMCQ(q)}
      <div class="feedback" id="fb-${q.n}"></div>
      ${isOpen ? `<div style="margin-top:12px">
        <button class="confirm-btn" id="btn-${q.n}" onclick="revealGabarito(${q.n})">Ver Gabarito</button>
      </div>` : `<div style="margin-top:12px">
        <button class="confirm-btn" id="btn-${q.n}" onclick="confirmAnswer(${q.n})" disabled>Confirmar</button>
      </div>`}
      ${isOpen ? `<div class="gabarito-box" id="gab-${q.n}">${q.gabarito}</div>` : `<div class="gabarito-box" id="gab-${q.n}"></div>`}
    `;

    container.appendChild(card);
  });
}

function buildMCQ(q) {
  const opts = shuffledOptions[q.n];
  return `<div class="options" id="opts-${q.n}">
    ${opts.map((opt, i) => `
      <button class="option" onclick="selectOption(${q.n}, ${i}, this)">
        <span class="opt-letter">${ORIG_LETTERS[i]}</span>
        <span>${opt.text}</span>
      </button>
    `).join('')}
  </div>`;
}

function buildOpenQuestion(q) {
  return `<textarea class="open-answer" id="oa-${q.n}" placeholder="Escreva sua resposta aqui..." oninput="updateProgress()"></textarea>`;
}

// =====================================================================
// INTERACTIONS
// =====================================================================
function selectOption(qn, displayedIndex, el) {
  if (answered[qn]) return;
  const opts = document.querySelectorAll(`#opts-${qn} .option`);
  opts.forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.displayedIndex = displayedIndex;
  document.getElementById(`btn-${qn}`).disabled = false;
  updateProgress();
}

function confirmAnswer(qn) {
  const q = questions.find(x => x.n === qn);
  const opts = document.querySelectorAll(`#opts-${qn} .option`);
  let selectedDisplayedIndex = null;

  opts.forEach((o) => {
    if (o.classList.contains('selected')) selectedDisplayedIndex = parseInt(o.dataset.displayedIndex);
  });

  if (selectedDisplayedIndex === null) return;

  const correct = isCorrectOption(q, selectedDisplayedIndex);
  answered[qn] = correct ? 'correct' : 'wrong';

  // Find which displayed index holds the correct answer
  const correctDisplayedIndex = shuffledOptions[qn].findIndex(
    (opt) => opt.originalIndex === ORIG_LETTERS.indexOf(q.answer)
  );

  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === correctDisplayedIndex) o.classList.add('correct');
    else if (i === selectedDisplayedIndex && !correct) o.classList.add('wrong');
  });

  const card = document.getElementById(`q-${qn}`);
  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');

  const fb = document.getElementById(`fb-${qn}`);
  // Show the displayed letter of the correct answer
  fb.textContent = correct ? '✅ Correto!' : `❌ Incorreto. A resposta certa estava na opção ${ORIG_LETTERS[correctDisplayedIndex]}`;
  fb.className = `feedback show ${correct ? 'ok' : 'err'}`;

  const gabBox = document.getElementById(`gab-${qn}`);
  gabBox.innerHTML = `<strong>Explicação:</strong> ${q.explanation}`;
  gabBox.classList.add('visible');

  document.getElementById(`btn-${qn}`).disabled = true;
  updateProgress();
}

function revealGabarito(qn) {
  answered[qn] = 'open';
  const gabBox = document.getElementById(`gab-${qn}`);
  gabBox.classList.add('visible');
  document.getElementById(`btn-${qn}`).disabled = true;
  const card = document.getElementById(`q-${qn}`);
  card.classList.add('answered-correct');
  updateProgress();
}

// =====================================================================
// PROGRESS
// =====================================================================
function updateProgress() {
  const total = 51;
  const done = Object.keys(answered).length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-bar').style.width = `${(done/total)*100}%`;
}

// =====================================================================
// TIMER
// =====================================================================
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

// =====================================================================
// SUBMIT
// =====================================================================
function submitQuiz() {
  clearInterval(timerInterval);
  let correct = 0, wrong = 0, open = 0, skip = 0;

  questions.forEach(q => {
    const ans = answered[q.n];
    if (!ans) {
      skip++;
    } else if (q.type === 'open') {
      open++;
    } else if (ans === 'correct') {
      correct++;
    } else if (ans === 'wrong') {
      wrong++;
    }
  });

  const mcqTotal = questions.filter(q => !q.type).length;
  const pct = Math.round((correct / mcqTotal) * 100);

  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-open').textContent = open;
  document.getElementById('r-skip').textContent = skip;
  document.getElementById('result-score').textContent = `${pct}%`;

  let title, msg;
  if (pct >= 80) { title = '🏆 Excelente!'; msg = 'Você domina Java fundamentals. Bora para a prova!'; }
  else if (pct >= 60) { title = '👍 Bom resultado!'; msg = 'Revise os erros e você chega lá. Você está no caminho certo.'; }
  else { title = '📚 Continue estudando!'; msg = 'Revise os tópicos errados usando o gabarito e tente novamente.'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  const panel = document.getElementById('result-panel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('submit-area').style.display = 'none';
}

function restartQuiz() {
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('submit-area').style.display = 'block';
  clearInterval(timerInterval);
  buildQuiz();
  startTimer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =====================================================================
// INIT
// =====================================================================
buildQuiz();
startTimer();
</script>
